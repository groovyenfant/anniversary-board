<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Live Wall - Pro Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000; /* ปรับเป็นสีดำสนิท */
            --sidebar-bg: #1e1e1e;
            --accent: #18a0fb;
            --text-main: #ffffff;
            /* Auto Scaling Variables */
            --note-width: 380px;
            --note-font: 32px;
            --note-radius: 25px;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            color: var(--text-main);
            overflow: hidden;
        }

        /* --- 1. Admin Sidebar (ฝั่งซ้าย) --- */
        #admin-panel {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .admin-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            background: #181818;
        }

        .admin-header h2 { 
            margin: 0; font-size: 18px; font-weight: 700; color: var(--accent);
        }
        
        /* Tabs System */
        .admin-tabs {
            display: flex;
            background: #252525;
            margin: 15px 15px 5px 15px;
            border-radius: 10px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: none;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .search-box {
            padding: 0 15px 15px 15px;
        }
        .search-input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        #queue-container, #live-list-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .hidden { display: none; }

        /* การ์ดใน Sidebar */
        .queue-card {
            background: #252525;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #333;
            animation: slideIn 0.3s ease-out;
        }
        .queue-card:hover { border-color: #555; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .queue-card .sender { font-size: 11px; color: var(--accent); font-weight: 700; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .queue-card .preview-msg { font-size: 13px; color: #ccc; line-height: 1.4; }
        .queue-card img.preview-img { width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #444; background: white; }
        
        .admin-actions { display: flex; gap: 8px; margin-top: 12px; align-items: center; }
        .btn {
            border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-approve { background: var(--accent); color: white; flex: 2; }
        .btn-reject { background: rgba(255, 71, 87, 0.1); color: #ff4757; flex: 1; }
        .btn-edit { background: #333; color: white; flex: 1; padding: 10px 5px; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid #333;
            background: #181818;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* --- 2. Live Canvas (ฝั่งขวา) --- */
        #canvas {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-dark);
            /* ลายจุดจางๆ บนพื้นสีดำ */
            background-image: radial-gradient(rgba(255,255,255,0.05) 1.2px, transparent 1.2px);
            background-size: 40px 40px;
        }

        .star-decor {
            position: absolute; width: 40px; height: 40px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"/></svg>');
            background-size: contain; opacity: 0.15; pointer-events: none;
        }

        .post-it {
            position: absolute;
            width: var(--note-width);
            min-width: 150px; min-height: 100px;
            padding: 25px;
            border-radius: var(--note-radius);
            box-shadow: 0 15px 45px rgba(0,0,0,0.6); /* เงาเข้มขึ้นบนพื้นดำ */
            cursor: grab;
            display: flex;
            flex-direction: column;
            resize: both; 
            overflow: hidden;
            transition: width 0.3s, height 0.3s, font-size 0.3s, left 0.6s ease, top 0.6s ease, background-color 0.3s ease;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .post-it:active { cursor: grabbing; z-index: 9999 !important; transition: none; }

        .post-it .content-text { font-size: var(--note-font); font-weight: 700; line-height: 1.25; margin-bottom: 15px; word-wrap: break-word; flex-grow: 1; pointer-events: none; }
        .post-it img.content-img { width: 100%; height: auto; border-radius: 15px; margin-bottom: 10px; pointer-events: none; }
        .post-it .footer { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; opacity: 0.8; pointer-events: none; }
        .post-it .dot { width: 8px; height: 8px; border-radius: 50%; background-color: currentColor; }

        .card-tools { position: absolute; top: 10px; right: 10px; display: none; align-items: center; gap: 8px; z-index: 10; }
        .post-it:hover .card-tools { display: flex; }

        .tool-btn { width: 28px; height: 28px; background: #ff4757; color: white; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
        
        .color-edit-wrapper { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 2px solid white; 
            cursor: pointer; 
            overflow: hidden; 
            padding: 0; 
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .color-edit-wrapper input { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <aside id="admin-panel">
        <div class="admin-header">
            <h2>Admin Control Center</h2>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('queue')">คิวรอ (Queue)</button>
            <button class="tab-btn" onclick="switchTab('live')">บนบอร์ด (Live)</button>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="search-input" placeholder="ค้นหาชื่อแขก..." oninput="filterItems()">
        </div>
        
        <!-- Tab 1: Queue -->
        <div id="queue-container">
            <div id="queue-list"></div>
        </div>

        <!-- Tab 2: Live List -->
        <div id="live-list-container" class="hidden">
            <div id="live-list"></div>
        </div>

        <div class="sidebar-footer">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-magic" style="flex:1" onclick="magicLayout()">🪄 Magic Layout</button>
                <button class="btn btn-approve" style="flex:1" onclick="approveAll()">✅ อนุมัติทั้งหมด</button>
            </div>
            <button class="btn btn-reject" style="width:100%" onclick="clearBoardUI()">ล้างหน้าจอทั้งหมด</button>
        </div>
    </aside>

    <main id="canvas">
        <!-- ดาวตกแต่งพื้นหลัง -->
        <div class="star-decor" style="top: 10%; left: 5%;"></div>
        <div class="star-decor" style="bottom: 15%; right: 10%; transform: scale(1.5);"></div>
        <div class="star-decor" style="top: 40%; left: 80%;"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA8cksEKdFZ6pDBKgaT0FLL4-uylLyx9c",
            authDomain: "companyanniversarytest.firebaseapp.com",
            databaseURL: "https://companyanniversarytest-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "companyanniversarytest",
            storageBucket: "companyanniversarytest.firebasestorage.app",
            messagingSenderId: "698195391398",
            appId: "1:698195391398:web:f677fe2869792766121567",
            measurementId: "G-EGH983F7VF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishesRef = ref(db, 'wishes');

        let zIndex = 1000;
        let pendingWishes = {}; 

        function updateScaling() {
            const notes = document.querySelectorAll('.post-it');
            const count = notes.length;
            let width, fontSize;
            if (count <= 3) { width = 520; fontSize = 48; }
            else if (count <= 8) { width = 380; fontSize = 32; }
            else if (count <= 16) { width = 280; fontSize = 22; }
            else { width = 200; fontSize = 16; }
            document.documentElement.style.setProperty('--note-width', width + 'px');
            document.documentElement.style.setProperty('--note-font', fontSize + 'px');
        }

        onChildAdded(wishesRef, (snapshot) => {
            const data = snapshot.val();
            const key = snapshot.key;
            pendingWishes[key] = data;
            renderQueueItem(key, data);
        });

        function renderQueueItem(key, data) {
            const list = document.getElementById('queue-list');
            const card = document.createElement('div');
            card.className = 'queue-card';
            card.id = `q-${key}`;
            card.setAttribute('data-name', (data.name || '').toLowerCase());
            
            let preview = data.image ? `<img src="${data.image}" class="preview-img">` : `<div class="preview-msg">${data.message}</div>`;
            card.innerHTML = `
                <div class="sender">${data.name || 'แขก'}</div>
                ${preview}
                <div class="admin-actions">
                    <button class="btn btn-approve" onclick="approve('${key}')">ขึ้นจอ ✅</button>
                    <button class="btn btn-reject" onclick="deleteFromDb('${key}')">ทิ้ง 🗑️</button>
                </div>
            `;
            list.prepend(card);
        }

        window.approve = function(key) {
            const data = pendingWishes[key];
            if (!data) return;

            const canvas = document.getElementById('canvas');
            const note = document.createElement('div');
            note.className = 'post-it';
            note.id = `note-${key}`;
            note.style.backgroundColor = data.color || '#ffffff';
            note.style.zIndex = zIndex++;
            note.style.left = (Math.random() * (canvas.offsetWidth - 400) + 50) + 'px';
            note.style.top = (Math.random() * (canvas.offsetHeight - 300) + 50) + 'px';
            note.style.transform = `rotate(${(Math.random() * 8) - 4}deg)`;
            note.style.color = getContrast(data.color || '#ffffff');

            let body = data.image ? `<img src="${data.image}" class="content-img">` : `<div class="content-text">${data.message}</div>`;
            note.innerHTML = `
                <div class="card-tools">
                    <div class="color-edit-wrapper"><input type="color" value="${data.color || '#ffffff'}" oninput="changeNoteColor('${key}', this.value)"></div>
                    <div class="tool-btn" onclick="removeNote('${key}')">✕</div>
                </div>
                ${body}
                <div class="footer"><div class="dot"></div><span>${data.name || 'แขก'}</span></div>
            `;
            initDrag(note);
            canvas.appendChild(note);
            
            addNoteToLiveList(key, data);
            document.getElementById(`q-${key}`).classList.add('hidden');
            updateScaling();
        };

        function addNoteToLiveList(key, data) {
            const liveList = document.getElementById('live-list');
            const card = document.createElement('div');
            card.className = 'queue-card';
            card.id = `live-item-${key}`;
            card.setAttribute('data-name', (data.name || '').toLowerCase());
            card.innerHTML = `
                <div class="sender">${data.name || 'แขก'}</div>
                <div class="admin-actions">
                    <div class="color-edit-wrapper" title="เปลี่ยนสี Post-it จากแถบ Admin">
                        <input type="color" value="${data.color || '#ffffff'}" oninput="changeNoteColor('${key}', this.value)">
                    </div>
                    <button class="btn btn-edit" onclick="focusNote('${key}')">📍 เล็ง</button>
                    <button class="btn btn-reject" onclick="removeNote('${key}')">✕</button>
                </div>
            `;
            liveList.prepend(card);
        }

        window.removeNote = function(key) {
            document.getElementById(`note-${key}`)?.remove();
            document.getElementById(`live-item-${key}`)?.remove();
            const qCard = document.getElementById(`q-${key}`);
            if (qCard) {
                qCard.classList.remove('hidden');
                qCard.style.opacity = '1';
                qCard.querySelector('.btn-approve').disabled = false;
            }
            updateScaling();
        };

        window.focusNote = function(key) {
            const el = document.getElementById(`note-${key}`);
            if (!el) return;
            el.style.zIndex = zIndex++;
            el.style.transition = "all 0.3s";
            el.style.outline = "5px solid var(--accent)";
            setTimeout(() => el.style.outline = "none", 1500);
        };

        window.approveAll = function() {
            const qCards = document.querySelectorAll('#queue-list .queue-card:not(.hidden)');
            qCards.forEach(card => {
                const key = card.id.replace('q-', '');
                approve(key);
            });
        };

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('queue-container').classList.add('hidden');
            document.getElementById('live-list-container').classList.add('hidden');
            
            if (tab === 'queue') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('queue-container').classList.remove('hidden');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('live-list-container').classList.remove('hidden');
            }
        };

        window.filterItems = function() {
            const val = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.queue-card').forEach(card => {
                const name = card.getAttribute('data-name');
                card.style.display = name.includes(val) ? 'block' : 'none';
            });
        };

        window.changeNoteColor = function(key, color) {
            const el = document.getElementById(`note-${key}`);
            if (el) { 
                el.style.backgroundColor = color; 
                el.style.color = getContrast(color); 
                const innerPicker = el.querySelector('input[type="color"]');
                if (innerPicker) innerPicker.value = color;
            }
            const sidebarPicker = document.querySelector(`#live-item-${key} input[type="color"]`);
            if (sidebarPicker) sidebarPicker.value = color;
        };

        window.magicLayout = function() {
            const notes = document.querySelectorAll('.post-it');
            if (notes.length === 0) return;
            const canvas = document.getElementById('canvas');
            const cols = Math.ceil(Math.sqrt(notes.length * (canvas.offsetWidth / canvas.offsetHeight)));
            const rows = Math.ceil(notes.length / cols);
            const cw = canvas.offsetWidth / cols, ch = canvas.offsetHeight / rows;
            notes.forEach((n, i) => {
                const r = Math.floor(i / cols), c = i % cols;
                n.style.left = (c * cw + 20) + "px"; n.style.top = (r * ch + 20) + "px";
            });
        };

        window.clearBoardUI = function() {
            if(!confirm('ล้างบอร์ดทั้งหมด?')) return;
            document.getElementById('canvas').innerHTML = '';
            document.getElementById('live-list').innerHTML = '';
            document.querySelectorAll('#queue-list .queue-card').forEach(c => {
                c.classList.remove('hidden');
                c.style.opacity = '1';
                c.querySelector('.btn-approve').disabled = false;
            });
            updateScaling();
        };

        window.deleteFromDb = function(key) {
            if(confirm('ลบถาวรจากฐานข้อมูล?')) {
                remove(ref(db, `wishes/${key}`));
                document.getElementById(`q-${key}`)?.remove();
                document.getElementById(`live-item-${key}`)?.remove();
                document.getElementById(`note-${key}`)?.remove();
            }
        };

        function initDrag(el) {
            let x = 0, y = 0;
            el.onmousedown = (e) => {
                if (e.target.closest('.card-tools')) return;
                const r = el.getBoundingClientRect();
                if (e.clientX > r.right - 30 && e.clientY > r.bottom - 30) return;
                el.style.zIndex = zIndex++;
                x = e.clientX; y = e.clientY;
                document.onmousemove = (ev) => {
                    let dx = x - ev.clientX, dy = y - ev.clientY;
                    x = ev.clientX; y = ev.clientY;
                    el.style.top = (el.offsetTop - dy) + "px"; el.style.left = (el.offsetLeft - dx) + "px";
                };
                document.onmouseup = () => document.onmousemove = null;
            };
        }

        function getContrast(hex){
            hex = hex.replace("#", "");
            let r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#1a1a1a' : '#ffffff';
        }
    </script>
</body>
</html>
