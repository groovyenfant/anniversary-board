<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>พิมพ์คำอวยพรของคุณ ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1e1e1e; --accent: #18a0fb; }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; }
        .header p { margin: 5px 0 0; font-size: 13px; color: #aaa; }

        /* พื้นที่ Preview Post-it */
        .preview-label { align-self: flex-start; color: #888; font-size: 12px; margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; }
        
        .post-it-preview {
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 320px;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            transition: background-color 0.3s ease;
            position: relative;
            overflow: hidden; /* ป้องกันข้อความล้นออกนอกแผ่น */
        }

        .preview-text-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .preview-text {
            font-size: 24px; /* ขนาดเริ่มต้น */
            font-weight: 700;
            line-height: 1.2;
            color: #1a1a1a;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            transition: font-size 0.1s ease;
        }

        .preview-footer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            opacity: 0.8;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-field {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus { border-color: var(--accent); }

        textarea.input-field {
            resize: none;
            height: 120px;
            line-height: 1.4;
        }

        /* ตัวเลือกสี */
        .color-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .color-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .color-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-circle.active {
            transform: scale(1.15);
            border-color: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .btn-send {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(24, 160, 251, 0.4);
            transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.98); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

    <div class="header">
        <h2>✍️ เขียนคำอวยพรของคุณ</h2>
        <p>พิมพ์ข้อความได้ไม่จำกัด ระบบจะปรับขนาดให้อัตโนมัติ</p>
    </div>

    <div class="preview-label">ตัวอย่างบนจอใหญ่</div>
    <div class="post-it-preview" id="postItPreview">
        <div class="preview-text-container" id="textContainer">
            <div class="preview-text" id="previewText">พิมพ์ข้อความที่นี่...</div>
        </div>
        <div class="preview-footer" id="previewFooter">
            <div class="footer-dot"></div>
            <span id="previewName">ชื่อของคุณ</span>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="gName" class="input-field" placeholder="ชื่อของคุณ..." maxlength="30">
        <!-- ลบ maxlength ออกเพื่อให้พิมพ์ได้ไม่จำกัด -->
        <textarea id="gMessage" class="input-field" placeholder="เขียนคำอวยพรที่นี่..."></textarea>
        
        <div class="color-section">
            <div class="label" style="color:#aaa; font-size:11px; text-transform: uppercase;">เลือกสีแผ่น Post-it</div>
            <div class="color-options" id="colorOptions">
                <div class="color-circle active" style="background: #ffffff;" data-color="#ffffff"></div>
                <div class="color-circle" style="background: #fff9c4;" data-color="#fff9c4"></div>
                <div class="color-circle" style="background: #ffcdd2;" data-color="#ffcdd2"></div>
                <div class="color-circle" style="background: #c8e6c9;" data-color="#c8e6c9"></div>
                <div class="color-circle" style="background: #bbdefb;" data-color="#bbdefb"></div>
                <div class="color-circle" style="background: #e1bee7;" data-color="#e1bee7"></div>
                <div class="color-circle" style="background: #ffe0b2;" data-color="#ffe0b2"></div>
            </div>
        </div>

        <button class="btn-send" id="sendBtn">ส่งคำอวยพรขึ้นจอ 🚀</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA8cksEKdFZ6pDBKgaT0FLL4-uylLyx9c",
            authDomain: "companyanniversarytest.firebaseapp.com",
            databaseURL: "https://companyanniversarytest-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "companyanniversarytest",
            storageBucket: "companyanniversarytest.firebasestorage.app",
            messagingSenderId: "698195391398",
            appId: "1:698195391398:web:f677fe2869792766121567",
            measurementId: "G-EGH983F7VF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const nameInput = document.getElementById('gName');
        const msgInput = document.getElementById('gMessage');
        const previewName = document.getElementById('previewName');
        const previewText = document.getElementById('previewText');
        const textContainer = document.getElementById('textContainer');
        const previewBox = document.getElementById('postItPreview');
        const previewFooter = document.getElementById('previewFooter');
        const sendBtn = document.getElementById('sendBtn');

        let currentColor = "#ffffff";

        // ฟังก์ชันปรับขนาดตัวอักษรอัตโนมัติ (Responsive Font)
        function adjustFontSize() {
            let fontSize = 28; // ขนาดเริ่มสูงสุด
            previewText.style.fontSize = fontSize + 'px';
            
            // วนลูปลดขนาดจนกว่าจะหายล้น หรือถึงขนาดต่ำสุดที่ 10px
            while ((previewText.offsetHeight > textContainer.offsetHeight || 
                    previewText.offsetWidth > textContainer.offsetWidth) && 
                   fontSize > 10) {
                fontSize--;
                previewText.style.fontSize = fontSize + 'px';
            }
        }

        nameInput.oninput = (e) => {
            previewName.innerText = e.target.value || "ชื่อของคุณ";
        };

        msgInput.oninput = (e) => {
            previewText.innerText = e.target.value || "พิมพ์ข้อความที่นี่...";
            adjustFontSize(); // ปรับขนาดทุกครั้งที่พิมพ์
        };

        // ระบบเลือกสี
        const colorCircles = document.querySelectorAll('.color-circle');
        colorCircles.forEach(circle => {
            circle.onclick = () => {
                colorCircles.forEach(c => c.classList.remove('active'));
                circle.classList.add('active');
                currentColor = circle.dataset.color;
                
                previewBox.style.backgroundColor = currentColor;
                
                const contrastColor = getContrast(currentColor);
                previewText.style.color = contrastColor;
                previewFooter.style.color = contrastColor;
            };
        });

        sendBtn.onclick = async function() {
            const name = nameInput.value.trim();
            const message = msgInput.value.trim();
            
            if (!message) {
                alert("กรุณาพิมพ์ข้อความก่อนส่งครับ");
                return;
            }

            this.disabled = true;
            this.innerText = "กำลังส่ง...";

            push(ref(db, 'wishes'), {
                name: name || "แขกนิรนาม",
                message: message,
                type: 'text',
                color: currentColor,
                timestamp: Date.now(),
                fontSize: window.getComputedStyle(previewText).fontSize // ส่งขนาดฟอนต์ไปด้วยเพื่อให้จอใหญ่แสดงผลใกล้เคียงที่สุด
            }).then(() => {
                alert("ส่งคำอวยพรของคุณขึ้นจอใหญ่แล้ว! 🎉");
                nameInput.value = "";
                msgInput.value = "";
                previewName.innerText = "ชื่อของคุณ";
                previewText.innerText = "พิมพ์ข้อความที่นี่...";
                previewText.style.fontSize = '24px';
                this.disabled = false;
                this.innerText = "ส่งคำอวยพรขึ้นจอ 🚀";
            }).catch((err) => {
                alert("เกิดข้อผิดพลาด: " + err.message);
                this.disabled = false;
                this.innerText = "ส่งคำอวยพรขึ้นจอ 🚀";
            });
        };

        function getContrast(hex){
            hex = hex.replace("#", "");
            let r = parseInt(hex.substr(0,2),16);
            let g = parseInt(hex.substr(2,2),16);
            let b = parseInt(hex.substr(4,2),16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? '#1a1a1a' : '#ffffff';
        }

        // จัดการเรื่อง Resize หน้าจอ (เช่น หมุนจอ)
        window.addEventListener('resize', adjustFontSize);
    </script>
</body>
</html>
